name: Validate data

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "0 21 * * *"

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: AzurLaneTools/AzurLaneData
          ref: main
          path: _external/AzurLaneData
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            JP/sharecfgdata/item_data_statistics.json
            JP/sharecfgdata/ship_data_statistics.json
            JP/sharecfgdata/weapon_property.json
            JP/sharecfgdata/equip_data_template.json
            JP/ShareCfg/ship_skin_template.json

      - uses: actions/checkout@v4
        with:
          repository: AzurLaneTools/AzurLaneLuaScripts
          ref: main
          path: _external/AzurLaneLuaScripts
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            versions/CN.txt
            versions/EN.txt
            versions/JP.txt
            versions/KR.txt
            versions/TW.txt

      - uses: actions/checkout@v4
        with:
          repository: ggmolly/belfast-data
          path: _external/belfast-data
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            build_pools.json
            build_times.json
            requisition_ships.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          go test ./internal/belfastconv/... ./cmd/...
          $out = Join-Path $env:RUNNER_TEMP "amagi_belfast_json_mvp"
          go run ./cmd/belfast_json_mvp `
            -source-root "$env:GITHUB_WORKSPACE\_external\AzurLaneData" `
            -luascripts-root "$env:GITHUB_WORKSPACE\_external\AzurLaneLuaScripts" `
            -output-root $out `
            -copy-helper-fallback-from "$env:GITHUB_WORKSPACE\_external\belfast-data"

      - uses: actions/upload-artifact@v4
        with:
          name: amagi-belfast-json-mvp
          path: ${{ runner.temp }}\amagi_belfast_json_mvp
